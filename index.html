<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EXTREME HUB</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1a1a1a;
    padding:25px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 0 20px #000;
}

input,button{
    width:95%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

input{
    background:#2a2a2a;
    color:white;
}

button{
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

#status{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 EXTREME HUB</h2>

<button onclick="gerarKey()">GERAR KEY</button>

<input id="keyInput" placeholder="Digite a key">
<button onclick="checkKey()">VALIDAR</button>

<p id="status"></p>
</div>

<script>

// 🔥 SUA CONFIG JÁ COLOCADA
const firebaseConfig = {
  apiKey: "AIzaSyAK1AE8yEF7pDnvEonYI38DMyelTO_8HfQ",
  authDomain: "extremehub-58eb7.firebaseapp.com",
  projectId: "extremehub-58eb7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔑 GERAR KEY (24H)
function gerarKey(){
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let key = "EXTREME-";

    for(let i=0;i<8;i++){
        key += chars[Math.floor(Math.random()*chars.length)];
    }

    let expira = Date.now() + 86400000;

    db.collection("keys").doc(key).set({
        expira: expira
    });

    alert("Sua key: " + key);
}

// ✅ VALIDAR KEY
async function checkKey(){
    let key = document.getElementById("keyInput").value.trim();
    let status = document.getElementById("status");

    let doc = await db.collection("keys").doc(key).get();

    if(!doc.exists){
        status.innerHTML = "❌ Key inválida";
        status.style.color = "red";
        return;
    }

    let data = doc.data();

    if(Date.now() > data.expira){
        status.innerHTML = "⏳ Key expirada";
        status.style.color = "orange";
        return;
    }

    status.innerHTML = "✔ Liberado! Script copiado 🔥";
    status.style.color = "lime";

    navigator.clipboard.writeText(`
loadstring(game:HttpGet("https://raw.githubusercontent.com/valentapolinario0-dev/NerphHex/main/XTCy3kG9.lua"))()
    `);
}

</script>

</body>
</html>
