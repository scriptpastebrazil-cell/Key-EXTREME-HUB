<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EXTREME HUB KEY</title>

<style>
body{
    background:#0f0f0f;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
    box-shadow:0 0 25px #000;
}

h1{
    font-size:20px;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    margin-bottom:15px;
}

button{
    width:95%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cc6a;
}

#status{
    margin-top:10px;
    font-size:14px;
}
</style>

</head>
<body>

<div class="box">
    <h1>🔐 EXTREME HUB KEY</h1>

    <input type="text" id="keyInput" placeholder="Digite sua key...">

    <button onclick="checkKey()">VERIFICAR</button>

    <p id="status"></p>
</div>

<script>
const KEYS_VALIDAS = [
    "20+20+20+7=67"
];

// função principal
function checkKey(){
    let key = document.getElementById("keyInput").value.trim();
    let status = document.getElementById("status");

    if(KEYS_VALIDAS.includes(key)){
        status.style.color = "#00ff88";
        status.innerHTML = "✔ Key correta! Script copiado 🔥";

        navigator.clipboard.writeText(`

--==================================================
-- EXTREME HUB
--==================================================

loadstring(game:HttpGet("https://raw.githubusercontent.com/valentapolinario0-dev/NerphHex/main/XTCy3kG9.lua"))()

        `);

    }else{
        status.style.color = "red";
        status.innerHTML = "✖ Key incorreta!";
    }
}
</script>

</body>
</html>
